name: Campulse Scraper

on:
  schedule:
    # Hora Colombia (UTC-5): 10:00 PM → 03:00 UTC
    - cron: '0 3 * * *'
    # Hora Colombia (UTC-5): 10:30 PM → 03:30 UTC
    - cron: '30 3 * * *'
    # Hora Colombia (UTC-5): 11:00 PM → 04:00 UTC
    - cron: '0 4 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run scraper
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          SITE_URL: ${{ secrets.SITE_URL }}
        run: python campulse.py
