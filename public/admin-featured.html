<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin — Featured Models · CampulseHub</title>
<meta name="robots" content="noindex,nofollow">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#0d0d14;--bg2:#13131f;--bg3:#1a1a2e;
    --bdr:#2a2a3a;--neon:#e040fb;--grn:#00e87a;
    --red:#ff4444;--gold:#f5c842;
    --txt:#f0f0f0;--txt2:#9ca3af;--txt3:#6b7280;
  }
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;min-height:100vh}

  /* ── HEADER ── */
  header{background:var(--bg2);border-bottom:1px solid var(--bdr);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100}
  .logo span:first-child{color:var(--neon);font-weight:800;font-size:18px}
  .logo span:last-child{color:var(--txt);font-weight:800;font-size:18px}
  .logo-sub{color:var(--txt3);font-size:12px;margin-left:8px}
  .header-right{display:flex;align-items:center;gap:10px}
  #auth-status{font-size:12px;color:var(--txt3)}

  /* ── LOGIN ── */
  #login-screen{display:flex;align-items:center;justify-content:center;min-height:80vh}
  .login-box{background:var(--bg2);border:1px solid var(--bdr);border-radius:16px;padding:32px;width:100%;max-width:360px}
  .login-box h2{font-size:20px;margin-bottom:8px}
  .login-box p{color:var(--txt3);font-size:13px;margin-bottom:24px}
  .field{margin-bottom:16px}
  .field label{display:block;font-size:11px;font-weight:600;color:var(--txt3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
  .field input{width:100%;background:var(--bg3);border:1px solid var(--bdr);border-radius:8px;padding:10px 12px;color:var(--txt);font-size:14px;font-family:inherit;outline:none;transition:border-color .15s}
  .field input:focus{border-color:rgba(224,64,251,.5)}
  .btn{width:100%;background:var(--neon);color:#fff;border:none;border-radius:8px;padding:12px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:opacity .15s}
  .btn:hover{opacity:.88}
  .btn:disabled{opacity:.5;cursor:not-allowed}
  .btn.secondary{background:transparent;border:1px solid var(--bdr);color:var(--txt2)}
  .btn.danger{background:var(--red)}
  .btn.small{padding:6px 12px;font-size:12px;width:auto;border-radius:6px}
  .error-msg{color:var(--red);font-size:12px;margin-top:8px;min-height:16px}

  /* ── MAIN ── */
  #main-screen{display:none;padding:24px;max-width:900px;margin:0 auto}

  /* ── ADD FORM ── */
  .add-card{background:var(--bg2);border:1px solid var(--bdr);border-radius:14px;padding:20px;margin-bottom:28px}
  .add-card h3{font-size:15px;font-weight:700;margin-bottom:16px;color:var(--txt)}
  .add-row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-end}
  .add-row .field{margin:0;flex:1;min-width:140px}
  .preview-img{width:44px;height:59px;border-radius:6px;object-fit:cover;border:1px solid var(--bdr);display:none;flex-shrink:0}

  /* ── LIST ── */
  .list-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
  .list-header h3{font-size:15px;font-weight:700}
  .list-hint{font-size:12px;color:var(--txt3)}
  .empty-state{text-align:center;padding:48px 0;color:var(--txt3);font-size:14px}

  /* ── ITEM ── */
  .item{background:var(--bg2);border:1px solid var(--bdr);border-radius:12px;padding:14px 16px;display:flex;align-items:center;gap:14px;margin-bottom:10px;cursor:grab;transition:border-color .15s,transform .15s,box-shadow .15s;user-select:none}
  .item:hover{border-color:rgba(224,64,251,.3)}
  .item.dragging{opacity:.5;transform:scale(.98);border-color:var(--neon);box-shadow:0 0 0 2px rgba(224,64,251,.3)}
  .item.drag-over{border-color:var(--neon);box-shadow:0 0 0 2px rgba(224,64,251,.4);transform:scale(1.01)}
  .item.inactive{opacity:.45}
  .drag-handle{color:var(--txt3);font-size:16px;cursor:grab;flex-shrink:0;padding:0 2px}
  .item-pos{width:28px;height:28px;border-radius:6px;background:var(--bg3);border:1px solid var(--bdr);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--neon);flex-shrink:0}
  .item-pos.pos-1{background:rgba(245,200,66,.1);border-color:var(--gold);color:var(--gold)}
  .item-pos.pos-2{background:rgba(176,184,196,.1);border-color:#b0b8c4;color:#b0b8c4}
  .item-pos.pos-3{background:rgba(192,112,48,.1);border-color:#c07030;color:#c07030}
  .item-thumb{width:40px;height:53px;border-radius:6px;object-fit:cover;border:1px solid var(--bdr);flex-shrink:0}
  .item-info{flex:1;min-width:0}
  .item-username{font-size:14px;font-weight:700;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .item-meta{font-size:11px;color:var(--txt3);margin-top:2px}
  .item-label{display:inline-block;font-size:10px;font-weight:700;padding:2px 8px;border-radius:99px;background:rgba(224,64,251,.15);color:var(--neon);border:1px solid rgba(224,64,251,.3);margin-top:4px}
  .item-actions{display:flex;gap:6px;flex-shrink:0}
  .toggle-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:5px 10px;font-size:11px;font-weight:600;cursor:pointer;font-family:inherit;color:var(--txt2);transition:all .15s}
  .toggle-btn:hover{border-color:var(--neon);color:var(--neon)}
  .toggle-btn.active-btn{background:rgba(0,232,122,.1);border-color:var(--grn);color:var(--grn)}
  .del-btn{background:transparent;border:1px solid var(--bdr);border-radius:6px;padding:5px 8px;font-size:12px;cursor:pointer;color:var(--txt3);transition:all .15s}
  .del-btn:hover{border-color:var(--red);color:var(--red)}

  /* ── TOAST ── */
  #toast{position:fixed;bottom:24px;right:24px;background:var(--bg2);border:1px solid var(--bdr);border-radius:10px;padding:10px 16px;font-size:13px;font-weight:600;opacity:0;transition:opacity .2s;pointer-events:none;z-index:999}
  #toast.show{opacity:1}
  #toast.ok{border-color:var(--grn);color:var(--grn)}
  #toast.err{border-color:var(--red);color:var(--red)}

  /* ── PATCH INDICATOR ── */
  #saving{font-size:11px;color:var(--txt3);display:none}
  #saving.show{display:inline}

  @media(max-width:600px){
    .add-row{flex-direction:column}
    .item-actions{flex-direction:column}
    #main-screen{padding:14px}
  }
</style>
</head>
<body>

<header>
  <div style="display:flex;align-items:center;gap:8px">
    <div class="logo"><span>CAMPULSE</span><span>HUB</span></div>
    <span class="logo-sub">/ Admin</span>
  </div>
  <div class="header-right">
    <span id="saving">Guardando...</span>
    <span id="auth-status"></span>
    <button class="btn secondary small" onclick="logout()" id="logout-btn" style="display:none">Salir</button>
  </div>
</header>

<!-- LOGIN -->
<div id="login-screen">
  <div class="login-box">
    <h2>🔐 Panel de Admin</h2>
    <p>Ingresa la clave de administrador para gestionar las modelos destacadas.</p>
    <div class="field">
      <label>Clave de Admin</label>
      <input type="password" id="secret-input" placeholder="••••••••" onkeydown="if(event.key==='Enter')login()">
    </div>
    <button class="btn" onclick="login()">Entrar</button>
    <div class="error-msg" id="login-error"></div>
  </div>
</div>

<!-- MAIN -->
<div id="main-screen">

  <!-- Add form -->
  <div class="add-card">
    <h3>➕ Agregar modelo destacada</h3>
    <div class="add-row">
      <div class="field" style="flex:2">
        <label>Username de Chaturbate</label>
        <input type="text" id="add-username" placeholder="ej: sweetangelxxx" oninput="previewThumb()" onkeydown="if(event.key==='Enter')addFeatured()">
      </div>
      <div class="field">
        <label>Posición</label>
        <input type="number" id="add-position" placeholder="Auto" min="1" style="width:90px">
      </div>
      <div class="field">
        <label>Etiqueta (opcional)</label>
        <input type="text" id="add-label" placeholder="VIP, Patrocinada...">
      </div>
      <img id="preview-img" class="preview-img" alt="preview">
      <button class="btn small" onclick="addFeatured()" style="margin-bottom:0;flex-shrink:0">Agregar</button>
    </div>
    <div class="error-msg" id="add-error"></div>
  </div>

  <!-- List -->
  <div class="list-header">
    <h3>📌 Modelos destacadas</h3>
    <span class="list-hint" id="list-hint">Arrastra para reordenar</span>
  </div>
  <div id="featured-list">
    <div class="empty-state">Cargando...</div>
  </div>

</div>

<div id="toast"></div>

<script>
// ─── CONFIG ──────────────────────────────────────────────────────
const API_BASE = '/api/featured-models';
let SECRET = '';
let items = [];
let dragSrc = null;
let saveTimer = null;

// ─── AUTH ─────────────────────────────────────────────────────────
function login() {
  const val = document.getElementById('secret-input').value.trim();
  if (!val) { document.getElementById('login-error').textContent = 'Ingresa la clave.'; return; }
  SECRET = val;
  // Verificar haciendo un GET con auth
  fetchFeatured().then(() => {
    document.getElementById('login-screen').style.display = 'none';
    document.getElementById('main-screen').style.display = 'block';
    document.getElementById('logout-btn').style.display = 'inline';
    document.getElementById('auth-status').textContent = 'Admin';
    document.getElementById('login-error').textContent = '';
  }).catch(() => {
    SECRET = '';
    document.getElementById('login-error').textContent = 'Clave incorrecta o error de conexión.';
  });
}

function logout() {
  SECRET = '';
  document.getElementById('login-screen').style.display = 'flex';
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('auth-status').textContent = '';
  document.getElementById('secret-input').value = '';
}

// ─── API CALLS ────────────────────────────────────────────────────
async function apiFetch(method, body) {
  const opts = {
    method,
    headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${SECRET}` },
  };
  if (body) opts.body = JSON.stringify(body);
  const res = await fetch(API_BASE, opts);
  if (res.status === 401) throw new Error('No autorizado');
  return res.json();
}

async function fetchFeatured() {
  const res = await fetch(API_BASE + '?_t=' + Date.now(), {
    headers: { 'Authorization': `Bearer ${SECRET}` }
  });
  if (!res.ok) throw new Error('Error');
  const data = await res.json();
  if (!Array.isArray(data)) throw new Error('Respuesta inválida');
  items = data;
  renderList();
}

// ─── RENDER ───────────────────────────────────────────────────────
function renderList() {
  const el = document.getElementById('featured-list');
  document.getElementById('list-hint').textContent = items.length
    ? `${items.length} modelo${items.length > 1 ? 's' : ''} · Arrastra para reordenar`
    : '';

  if (!items.length) {
    el.innerHTML = '<div class="empty-state">No hay modelos destacadas. Agrega la primera arriba.</div>';
    return;
  }

  el.innerHTML = items.map((item, i) => `
    <div class="item${item.active === false ? ' inactive' : ''}"
      draggable="true"
      data-username="${item.username}"
      data-index="${i}"
      ondragstart="onDragStart(event)"
      ondragover="onDragOver(event)"
      ondrop="onDrop(event)"
      ondragend="onDragEnd(event)">
      <span class="drag-handle">⠿</span>
      <div class="item-pos pos-${item.position}">${item.position}</div>
      <img class="item-thumb"
        src="https://thumb.live.mmcdn.com/riw/${item.username}.jpg"
        onerror="this.src='https://thumb.live.mmcdn.com/ri/${item.username}.jpg'"
        alt="${item.username}">
      <div class="item-info">
        <div class="item-username">${item.username}</div>
        <div class="item-meta">Posición ${item.position}${item.active === false ? ' · Inactiva' : ' · Activa'}</div>
        ${item.label ? `<div class="item-label">${item.label}</div>` : ''}
      </div>
      <div class="item-actions">
        <a href="https://chaturbate.com/in/?tour=LQps&campaign=rI8z3&track=default&room=${item.username}" target="_blank" rel="noopener"
          class="toggle-btn" style="text-decoration:none">Ver ↗</a>
        <button class="toggle-btn${item.active !== false ? ' active-btn' : ''}"
          onclick="toggleActive('${item.username}', ${item.active !== false})">
          ${item.active !== false ? '✓ Activa' : '○ Inactiva'}
        </button>
        <button class="del-btn" onclick="deleteFeatured('${item.username}')" title="Eliminar">🗑</button>
      </div>
    </div>
  `).join('');
}

// ─── ADD ──────────────────────────────────────────────────────────
async function addFeatured() {
  const username = document.getElementById('add-username').value.trim().toLowerCase();
  const position = parseInt(document.getElementById('add-position').value) || null;
  const label = document.getElementById('add-label').value.trim() || null;
  const errEl = document.getElementById('add-error');

  errEl.textContent = '';
  if (!username) { errEl.textContent = 'Ingresa el username.'; return; }

  try {
    await apiFetch('POST', { username, position, label });
    document.getElementById('add-username').value = '';
    document.getElementById('add-position').value = '';
    document.getElementById('add-label').value = '';
    document.getElementById('preview-img').style.display = 'none';
    await fetchFeatured();
    toast('Modelo agregada ✓', 'ok');
  } catch (e) {
    errEl.textContent = 'Error al agregar. ¿El username ya existe?';
    toast('Error al agregar', 'err');
  }
}

// ─── TOGGLE ACTIVE ────────────────────────────────────────────────
async function toggleActive(username, currentlyActive) {
  try {
    await apiFetch('PUT', { username, active: !currentlyActive });
    await fetchFeatured();
    toast(currentlyActive ? 'Modelo desactivada' : 'Modelo activada ✓', 'ok');
  } catch (e) {
    toast('Error al actualizar', 'err');
  }
}

// ─── DELETE ───────────────────────────────────────────────────────
async function deleteFeatured(username) {
  if (!confirm(`¿Eliminar "${username}" de las destacadas?`)) return;
  try {
    await apiFetch('DELETE', { username });
    await fetchFeatured();
    toast('Modelo eliminada', 'ok');
  } catch (e) {
    toast('Error al eliminar', 'err');
  }
}

// ─── DRAG & DROP REORDER ─────────────────────────────────────────
function onDragStart(e) {
  dragSrc = e.currentTarget;
  dragSrc.classList.add('dragging');
  e.dataTransfer.effectAllowed = 'move';
}

function onDragOver(e) {
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
  document.querySelectorAll('.item').forEach(el => el.classList.remove('drag-over'));
  e.currentTarget.classList.add('drag-over');
}

function onDrop(e) {
  e.preventDefault();
  const target = e.currentTarget;
  if (target === dragSrc) return;

  const srcIdx = parseInt(dragSrc.dataset.index);
  const tgtIdx = parseInt(target.dataset.index);

  // Reorder array
  const moved = items.splice(srcIdx, 1)[0];
  items.splice(tgtIdx, 0, moved);

  // Reassign positions
  items.forEach((item, i) => { item.position = i + 1; });

  renderList();
  scheduleSave();
}

function onDragEnd(e) {
  document.querySelectorAll('.item').forEach(el => {
    el.classList.remove('dragging', 'drag-over');
  });
  dragSrc = null;
}

// ─── SAVE POSITIONS (debounced) ───────────────────────────────────
function scheduleSave() {
  clearTimeout(saveTimer);
  document.getElementById('saving').classList.add('show');
  saveTimer = setTimeout(async () => {
    try {
      await Promise.all(items.map(item =>
        apiFetch('PUT', { username: item.username, position: item.position })
      ));
      toast('Orden guardado ✓', 'ok');
    } catch (e) {
      toast('Error guardando orden', 'err');
    } finally {
      document.getElementById('saving').classList.remove('show');
    }
  }, 800);
}

// ─── PREVIEW THUMB ───────────────────────────────────────────────
function previewThumb() {
  const u = document.getElementById('add-username').value.trim().toLowerCase();
  const img = document.getElementById('preview-img');
  if (u.length < 3) { img.style.display = 'none'; return; }
  img.style.display = 'block';
  img.src = `https://thumb.live.mmcdn.com/riw/${u}.jpg`;
  img.onerror = () => { img.src = `https://thumb.live.mmcdn.com/ri/${u}.jpg`; };
}

// ─── TOAST ───────────────────────────────────────────────────────
function toast(msg, type = 'ok') {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = `show ${type}`;
  setTimeout(() => { el.className = ''; }, 2500);
}
</script>
</body>
</html>
