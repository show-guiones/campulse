<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campulse — Live Cam Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --bg2: #101010;
  --bg3: #161616;
  --bg4: #1c1c1c;
  --border: #1e1e1e;
  --border2: #282828;
  --text: #eeebe6;
  --muted: #555;
  --muted2: #333;
  --accent: #e8503a;
  --accent2: #ff6b52;
  --green: #2dd98f;
  --blue: #3d9fff;
  --amber: #f0a020;
  --female: #ff5f9e;
  --male: #3d9fff;
  --couple: #9d7eff;
  --trans: #2dd98f;
}
*{margin:0;padding:0;box-sizing:border-box}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  min-height:100vh;
  overflow-x:hidden;
}

/* ── HEADER ── */
header {
  position:sticky;top:0;z-index:200;
  height:56px;padding:0 1.5rem;
  display:flex;align-items:center;justify-content:space-between;
  background:rgba(8,8,8,0.92);
  border-bottom:1px solid var(--border);
  backdrop-filter:blur(16px);
}
.logo {
  display:flex;align-items:center;gap:10px;
  font-size:1rem;font-weight:800;letter-spacing:.06em;
  text-transform:uppercase;
}
.pulse {
  width:8px;height:8px;border-radius:50%;background:var(--accent);
  animation:pls 2s ease-in-out infinite;
}
@keyframes pls{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(.7);opacity:.4}}
.hdr-r{display:flex;align-items:center;gap:1.25rem;font-family:'DM Mono',monospace;font-size:.7rem;color:var(--muted)}
.live-tag{display:flex;align-items:center;gap:5px;color:var(--green)}
.live-dot{width:6px;height:6px;border-radius:50%;background:var(--green);animation:pls 1.4s ease-in-out infinite}

/* ── MAIN ── */
main{max-width:1440px;margin:0 auto;padding:1.5rem}

/* ── STATS ── */
.stats{
  display:grid;grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
  border:1px solid var(--border);border-radius:14px;
  overflow:hidden;margin-bottom:1.5rem;
}
.stat{
  background:var(--bg2);padding:1.1rem 1.4rem;
  display:flex;flex-direction:column;gap:3px;
}
.stat-lbl{
  font-size:.6rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.12em;
  font-family:'DM Mono',monospace;
}
.stat-val{
  font-size:1.5rem;font-weight:800;
  letter-spacing:-.03em;line-height:1;
}
.stat-sub{font-size:.65rem;color:var(--muted);font-family:'DM Mono',monospace}
.stat:nth-child(1) .stat-val{color:var(--text)}
.stat:nth-child(2) .stat-val{color:var(--accent)}
.stat:nth-child(3) .stat-val{color:var(--green)}
.stat:nth-child(4) .stat-val{color:var(--amber)}

/* ── GENDER BAR ── */
.gender-overview{
  display:flex;gap:1rem;margin-bottom:1.5rem;
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:1rem 1.25rem;
  align-items:center;flex-wrap:wrap;
}
.g-bar-wrap{flex:1;min-width:200px}
.g-bar{display:flex;height:6px;border-radius:3px;overflow:hidden;gap:2px}
.g-seg{border-radius:3px;transition:width .5s ease}
.g-legend{display:flex;gap:1rem;margin-top:.6rem;flex-wrap:wrap}
.g-leg-item{display:flex;align-items:center;gap:5px;font-size:.65rem;font-family:'DM Mono',monospace;color:var(--muted)}
.g-dot{width:7px;height:7px;border-radius:50%}
.g-count{color:var(--text);font-weight:500}

/* ── CONTROLS ── */
.controls{
  display:flex;gap:.6rem;margin-bottom:1.25rem;
  flex-wrap:wrap;align-items:center;
}
.search-wrap{flex:1;min-width:180px;position:relative}
.search-wrap input{
  width:100%;background:var(--bg2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);
  font-family:'DM Mono',monospace;font-size:.78rem;
  padding:.55rem .9rem .55rem 2.2rem;outline:none;
  transition:border-color .2s;
}
.search-wrap input:focus{border-color:var(--accent)}
.search-wrap input::placeholder{color:var(--muted2)}
.si{position:absolute;left:.75rem;top:50%;transform:translateY(-50%);color:var(--muted);font-size:.85rem;pointer-events:none}

.fg{
  display:flex;gap:3px;background:var(--bg2);
  border:1px solid var(--border2);border-radius:8px;padding:3px;
}
.fb{
  background:none;border:none;color:var(--muted);
  font-family:'Syne',sans-serif;font-size:.72rem;font-weight:600;
  padding:.38rem .75rem;border-radius:6px;cursor:pointer;
  transition:all .15s;white-space:nowrap;
}
.fb:hover{color:var(--text);background:var(--border)}
.fb.on{background:var(--accent);color:#fff}
.fb.on-f{background:var(--female);color:#fff}
.fb.on-m{background:var(--male);color:#fff}
.fb.on-c{background:var(--couple);color:#fff}
.fb.on-t{background:var(--trans);color:#fff}

.sort-sel{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:8px;color:var(--text);
  font-family:'DM Mono',monospace;font-size:.72rem;
  padding:.55rem .9rem;outline:none;cursor:pointer;
}
.refresh{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:8px;color:var(--muted);
  font-family:'Syne',sans-serif;font-size:.72rem;font-weight:600;
  padding:.55rem .9rem;cursor:pointer;
  display:flex;align-items:center;gap:5px;transition:all .15s;
}
.refresh:hover{color:var(--text);border-color:var(--accent)}
.refresh.spin .ri{display:inline-block;animation:rot .7s linear infinite}
@keyframes rot{to{transform:rotate(360deg)}}
.vtoggle{
  display:flex;gap:3px;background:var(--bg2);
  border:1px solid var(--border2);border-radius:8px;padding:3px;
}
.vb{
  background:none;border:none;color:var(--muted);
  padding:.38rem .55rem;border-radius:6px;cursor:pointer;
  font-size:.85rem;transition:all .15s;
}
.vb.on{background:var(--border2);color:var(--text)}

.res-info{font-size:.68rem;color:var(--muted);font-family:'DM Mono',monospace;margin-bottom:1rem}

/* ── GRID ── */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:.85rem;
}
.card{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;overflow:hidden;cursor:pointer;
  transition:transform .2s,border-color .2s,box-shadow .2s;
  position:relative;
}
.card:hover{
  transform:translateY(-4px);
  border-color:var(--border2);
  box-shadow:0 12px 32px rgba(0,0,0,.5);
}
.card-img-box{overflow:hidden;position:relative;aspect-ratio:3/4;background:var(--bg3)}
.card-img{
  width:100%;height:100%;object-fit:cover;display:block;
  transition:transform .3s;
}
.card:hover .card-img{transform:scale(1.05)}
.card-img-box .placeholder{
  width:100%;height:100%;display:flex;align-items:center;
  justify-content:center;background:var(--bg3);
  font-size:2.5rem;color:var(--muted2);
}
.badges{position:absolute;top:7px;left:7px;display:flex;flex-direction:column;gap:3px}
.bdg{
  font-size:.52rem;font-weight:700;font-family:'DM Mono',monospace;
  padding:2px 6px;border-radius:3px;text-transform:uppercase;letter-spacing:.05em;
}
.bdg-hd{background:rgba(61,159,255,.9);color:#fff}
.bdg-new{background:rgba(45,217,143,.9);color:#fff}
.vw-badge{
  position:absolute;bottom:7px;right:7px;
  background:rgba(0,0,0,.75);color:#fff;
  font-family:'DM Mono',monospace;font-size:.6rem;
  padding:3px 7px;border-radius:20px;
  backdrop-filter:blur(6px);
  display:flex;align-items:center;gap:4px;
}
.vw-dot{width:5px;height:5px;border-radius:50%;background:var(--green)}
.g-line{height:2px;width:100%}
.g-f{background:var(--female)}.g-m{background:var(--male)}
.g-c{background:var(--couple)}.g-t{background:var(--trans)}
.card-body{padding:.65rem .75rem}
.card-name{font-size:.78rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;margin-bottom:2px}
.card-meta{font-size:.62rem;color:var(--muted);font-family:'DM Mono',monospace;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.fav-btn{
  position:absolute;top:7px;right:7px;
  background:rgba(0,0,0,.6);border:none;
  width:26px;height:26px;border-radius:50%;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  font-size:.7rem;backdrop-filter:blur(4px);
  transition:transform .2s;color:var(--muted);
}
.fav-btn:hover{transform:scale(1.25)}
.fav-btn.on{color:#ff4f6d}

/* ── LIST ── */
.list-view{display:none}
.list-view.show{display:block}
.grid.hide{display:none}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th{
  text-align:left;font-size:.6rem;color:var(--muted);
  text-transform:uppercase;letter-spacing:.08em;
  font-family:'DM Mono',monospace;
  padding:.45rem .7rem;border-bottom:1px solid var(--border);
  cursor:pointer;white-space:nowrap;user-select:none;
}
th:hover{color:var(--text)}
td{padding:.55rem .7rem;border-bottom:1px solid var(--border);vertical-align:middle}
tr:hover td{background:var(--bg2)}
tr{cursor:pointer}
.l-av{width:34px;height:34px;border-radius:7px;object-fit:cover;background:var(--bg3);display:block}
.l-av-ph{width:34px;height:34px;border-radius:7px;background:var(--bg3);display:flex;align-items:center;justify-content:center;font-size:1rem;color:var(--muted2)}
.l-name{font-weight:600}
.l-sub{font-size:.62rem;color:var(--muted);font-family:'DM Mono',monospace}
.vbar-w{width:90px;height:4px;background:var(--border);border-radius:2px;overflow:hidden}
.vbar-f{height:100%;background:var(--accent);border-radius:2px}
.gpill{font-size:.58rem;font-weight:700;padding:2px 7px;border-radius:20px;font-family:'DM Mono',monospace}
.gp-f{background:rgba(255,95,158,.12);color:var(--female)}
.gp-m{background:rgba(61,159,255,.12);color:var(--male)}
.gp-c{background:rgba(157,126,255,.12);color:var(--couple)}
.gp-t{background:rgba(45,217,143,.12);color:var(--trans)}

/* ── MODAL ── */
.modal-bg{
  display:none;position:fixed;inset:0;
  background:rgba(0,0,0,.88);z-index:1000;
  align-items:center;justify-content:center;
  backdrop-filter:blur(10px);padding:1rem;
}
.modal-bg.open{display:flex}
.modal{
  background:var(--bg2);border:1px solid var(--border2);
  border-radius:18px;max-width:680px;width:100%;
  max-height:92vh;overflow-y:auto;position:relative;
  animation:mIn .2s ease;
}
@keyframes mIn{from{opacity:0;transform:scale(.95) translateY(10px)}to{opacity:1;transform:none}}
.mcx{
  position:absolute;top:.9rem;right:.9rem;
  background:var(--border);border:none;color:var(--muted);
  width:30px;height:30px;border-radius:50%;cursor:pointer;
  font-size:.9rem;display:flex;align-items:center;justify-content:center;
  transition:all .15s;z-index:5;
}
.mcx:hover{background:var(--border2);color:var(--text)}
.m-top{display:grid;grid-template-columns:220px 1fr}
.m-img{
  width:220px;height:290px;object-fit:cover;
  border-radius:18px 0 0 0;display:block;background:var(--bg3);
}
.m-img-ph{
  width:220px;height:290px;background:var(--bg3);
  display:flex;align-items:center;justify-content:center;
  font-size:4rem;color:var(--muted2);border-radius:18px 0 0 0;
}
.m-info{padding:1.4rem;display:flex;flex-direction:column;gap:.7rem}
.m-name{font-size:1.35rem;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.m-disp{font-size:.75rem;color:var(--muted)}
.m-subj{font-size:.75rem;color:var(--muted);font-family:'DM Mono',monospace;line-height:1.6}
.m-stats{
  display:grid;grid-template-columns:repeat(3,1fr);
  gap:.7rem;padding:1.1rem 1.4rem;
  border-top:1px solid var(--border);
}
.ms{text-align:center}
.ms-v{font-size:1.15rem;font-weight:800;letter-spacing:-.02em}
.ms-l{font-size:.58rem;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;font-family:'DM Mono',monospace;margin-top:2px}
.m-body{padding:1.1rem 1.4rem;border-top:1px solid var(--border)}
.m-tags{display:flex;flex-wrap:wrap;gap:5px;margin-bottom:1.1rem}
.tag{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--muted);font-size:.62rem;font-family:'DM Mono',monospace;
  padding:3px 9px;border-radius:20px;
}
.m-acts{display:flex;gap:.65rem}
.btn-p{
  flex:1;background:var(--accent);color:#fff;border:none;
  border-radius:8px;padding:.7rem;font-family:'Syne',sans-serif;
  font-size:.78rem;font-weight:700;cursor:pointer;
  text-decoration:none;text-align:center;
  display:flex;align-items:center;justify-content:center;gap:5px;
  transition:opacity .15s;
}
.btn-p:hover{opacity:.85}
.btn-s{
  background:var(--bg3);border:1px solid var(--border2);
  color:var(--text);border-radius:8px;padding:.7rem 1rem;
  font-family:'Syne',sans-serif;font-size:.78rem;font-weight:600;
  cursor:pointer;transition:border-color .15s;
}
.btn-s:hover{border-color:var(--accent)}

/* ── SKELETON ── */
@keyframes shim{0%{background:var(--bg2)}50%{background:var(--bg3)}100%{background:var(--bg2)}}
.sk{animation:shim 1.4s infinite linear}
.sk-card{background:var(--bg2);border:1px solid var(--border);border-radius:12px;overflow:hidden}
.sk-img{aspect-ratio:3/4;background:var(--bg3)}
.sk-body{padding:.65rem .75rem}
.sk-line{height:9px;border-radius:4px;margin-bottom:5px}

/* ── TOAST ── */
.toast{
  position:fixed;bottom:1.5rem;right:1.5rem;
  background:var(--bg2);border:1px solid var(--border2);
  color:var(--text);font-size:.75rem;font-family:'DM Mono',monospace;
  padding:.65rem 1.1rem;border-radius:10px;z-index:3000;
  transform:translateY(80px);opacity:0;transition:all .3s;
  pointer-events:none;
}
.toast.show{transform:translateY(0);opacity:1}

/* ── RESPONSIVE ── */
@media(max-width:768px){
  main{padding:1rem}
  .stats{grid-template-columns:repeat(2,1fr)}
  .m-top{grid-template-columns:1fr}
  .m-img,.m-img-ph{width:100%;height:220px;border-radius:18px 18px 0 0}
  .grid{grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:.65rem}
  .gender-overview{display:none}
}
@media(max-width:480px){
  header{padding:0 1rem}
  .stats{grid-template-columns:repeat(2,1fr)}
}
</style>
</head>
<body>

<header>
  <div class="logo"><div class="pulse"></div>CAMPULSE</div>
  <div class="hdr-r">
    <div class="live-tag"><div class="live-dot"></div>LIVE</div>
    <span id="ts">—</span>
  </div>
</header>

<main>

  <div class="stats">
    <div class="stat">
      <div class="stat-lbl">Salas online</div>
      <div class="stat-val" id="s-total">—</div>
      <div class="stat-sub">chaturbate</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Viewers totales</div>
      <div class="stat-val" id="s-views">—</div>
      <div class="stat-sub">en vivo ahora</div>
    </div>
    <div class="stat">
      <div class="stat-lbl">Favoritas</div>
      <div class="stat-val" id="s-favs">0</div>

    </div>

    <select class="sort-sel" id="srt">
      <option value="viewers">↓ Viewers</option>
      <option value="followers">↓ Seguidores</option>

</main>

<!-- Modal -->

<div class="toast" id="toast"></div>

<script>
const AFF = 'rI8z3';
const CB_URL = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${AFF}&client_ip=request_ip&format=json&limit=500`;
const PROXY = 'https://corsproxy.io/?url=';

let rooms=[], favs=JSON.parse(localStorage.getItem('cp2_favs')||'[]');
let gender='', country='', onlyFavs=false, onlyHD=false;
let sort='viewers', view='grid', maxV=1, active=null;

const fmt=n=>n>=1e6?(n/1e6).toFixed(1)+'M':n>=1000?(n/1000).toFixed(1)+'K':String(n);

// Imagen con fallback
function imgEl(src, cls, ph='👤') {
  if (!src) return `<div class="${cls} placeholder" style="display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--muted2);background:var(--bg3)">${ph}</div>`;
  return `<img class="${cls}" src="${src}" loading="lazy" 
    onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'${cls} placeholder',style:'display:flex;align-items:center;justify-content:center;font-size:2.5rem;color:var(--muted2);background:var(--bg3)',innerHTML:'${ph}'}))">`;
}

async function load() {
  const btn=document.getElementById('ref');
  btn.classList.add('spin');
  skeleton();
  try {
    const res = await fetch(PROXY + encodeURIComponent(CB_URL));
    const data = await res.json();
    rooms = data.results||[];
    maxV = Math.max(...rooms.map(r=>r.num_users||0),1);
    updateStats();
    renderGenderBar();
    render();
    document.getElementById('ts').textContent = new Date().toLocaleTimeString('es-CO');
  } catch(e) {
    document.getElementById('gc').innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">
      <div style="font-size:2rem;margin-bottom:.5rem">⚠</div>
      <div style="margin-bottom:.5rem">Error cargando datos</div>
      <button onclick="load()" style="background:var(--accent);color:#fff;border:none;padding:.5rem 1rem;border-radius:6px;cursor:pointer;font-family:inherit">Reintentar</button>
    </div>`;
  } finally { btn.classList.remove('spin'); }
}

function skeleton() {
  document.getElementById('gc').innerHTML = Array(24).fill(0).map(()=>`
    <div class="sk-card sk">
      <div class="sk-img sk"></div>
      <div class="sk-body">
        <div class="sk-line sk" style="width:65%"></div>
        <div class="sk-line sk" style="width:40%"></div>
      </div>
    </div>`).join('');
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase();
  let r=[...rooms];
  if(gender) r=r.filter(x=>x.gender===gender);
  if(country) r=r.filter(x=>x.country===country);
  if(onlyFavs) r=r.filter(x=>favs.includes(x.username));
  if(onlyHD) r=r.filter(x=>x.is_hd);
  if(q) r=r.filter(x=>(x.username||'').toLowerCase().includes(q)||(x.display_name||'').toLowerCase().includes(q));
  r.sort((a,b)=>{
    if(sort==='viewers') return (b.num_users||0)-(a.num_users||0);
    if(sort==='followers') return (b.num_followers||0)-(a.num_followers||0);
    if(sort==='age') return (a.age||99)-(b.age||99);
    return 0;
  });
  return r;
}

function updateStats() {
  document.getElementById('s-total').textContent=fmt(rooms.length);
  document.getElementById('s-views').textContent=fmt(rooms.reduce((s,r)=>s+(r.num_users||0),0));
  document.getElementById('s-favs').textContent=favs.length;
}

function renderGenderBar() {
  const counts={f:0,m:0,c:0,t:0};
  rooms.forEach(r=>{if(counts[r.gender]!==undefined)counts[r.gender]++});
  const total=rooms.length||1;
  const colors={f:'var(--female)',m:'var(--male)',c:'var(--couple)',t:'var(--trans)'};
  const labels={f:'Mujeres',m:'Hombres',c:'Parejas',t:'Trans'};
  document.getElementById('g-bar').innerHTML=Object.entries(counts).map(([g,n])=>
    `<div class="g-seg" style="width:${(n/total*100).toFixed(1)}%;background:${colors[g]}"></div>`).join('');
  document.getElementById('g-legend').innerHTML=Object.entries(counts).map(([g,n])=>
    `<div class="g-leg-item"><div class="g-dot" style="background:${colors[g]}"></div>${labels[g]} <span class="g-count">${fmt(n)}</span></div>`).join('');
}

function render() {
  const r=getFiltered();
  document.getElementById('s-show').textContent=fmt(r.length);
  const parts=[];
  if(gender) parts.push({f:'mujeres',m:'hombres',c:'parejas',t:'trans'}[gender]);
  if(country) parts.push('Colombia');
  if(onlyFavs) parts.push('favoritas');
  if(onlyHD) parts.push('HD');
  document.getElementById('ri').textContent=`${r.length.toLocaleString()} resultados${parts.length?' · '+parts.join(' · '):''}`;
  if(view==='grid') renderGrid(r);
  else renderList(r);
}

function renderGrid(r) {
  const g=document.getElementById('gc');
  if(!r.length){g.innerHTML=`<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">Sin resultados</div>`;return;}
  g.innerHTML=r.map(x=>{
    const fv=favs.includes(x.username);
    return `<div class="card" onclick="openMod('${x.username}')">
      <div class="card-img-box">
        ${imgEl(x.image_url,'card-img')}
        <div class="badges">
          ${x.is_hd?'<span class="bdg bdg-hd">HD</span>':''}
          ${x.is_new?'<span class="bdg bdg-new">NEW</span>':''}
        </div>
        <div class="vw-badge"><div class="vw-dot"></div>${fmt(x.num_users||0)}</div>
        <button class="fav-btn ${fv?'on':''}" onclick="toggleFav(event,'${x.username}')">♥</button>
      </div>
      <div class="g-line g-${x.gender}"></div>
      <div class="card-body">
        <div class="card-name">${x.display_name||x.username}</div>
        <div class="card-meta">${x.country||'—'} · ${x.age?x.age+'a':'—'}</div>
      </div>
    </div>`;
  }).join('');
}

function renderList(r) {
  const gl={f:'Mujer',m:'Hombre',c:'Pareja',t:'Trans'};
  const b=document.getElementById('lb');
  if(!r.length){b.innerHTML=`<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">Sin resultados</td></tr>`;return;}
  b.innerHTML=r.map(x=>`
    <tr onclick="openMod('${x.username}')">
      <td>${x.image_url
        ?`<img class="l-av" src="${x.image_url}" loading="lazy" onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'l-av-ph',innerHTML:'👤'}))">`
        :`<div class="l-av-ph">👤</div>`}
      </td>
      <td><div class="l-name">${x.display_name||x.username}</div><div class="l-sub">@${x.username}</div></td>
      <td><span class="gpill gp-${x.gender}">${gl[x.gender]||'—'}</span></td>
      <td><div style="display:flex;align-items:center;gap:7px">
        <span style="font-family:'DM Mono',monospace;font-size:.75rem">${fmt(x.num_users||0)}</span>
        <div class="vbar-w"><div class="vbar-f" style="width:${Math.round((x.num_users||0)/maxV*100)}%"></div></div>
      </div></td>
      <td style="font-family:'DM Mono',monospace;font-size:.72rem;color:var(--muted)">${fmt(x.num_followers||0)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:.75rem">${x.age||'—'}</td>
      <td style="font-size:.72rem;color:var(--muted)">${x.country||'—'}</td>
      <td><button class="fav-btn ${favs.includes(x.username)?'on':''}" style="position:static;width:28px;height:28px;background:var(--bg3)" onclick="toggleFav(event,'${x.username}')">♥</button></td>
    </tr>`).join('');
}

function openMod(u) {
  const x=rooms.find(r=>r.username===u);
  if(!x) return;
  active=x;
  const gl={f:'Mujer',m:'Hombre',c:'Pareja',t:'Trans'};
  const gc={f:'var(--female)',m:'var(--male)',c:'var(--couple)',t:'var(--trans)'};
  const wrap=document.getElementById('m-img-wrap');
  if(x.image_url){
    wrap.innerHTML=`<img class="m-img" src="${x.image_url}" alt="${x.username}"
      onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'m-img-ph',innerHTML:'👤'}))">`;
  } else {
    wrap.innerHTML=`<div class="m-img-ph">👤</div>`;
  }
  document.getElementById('mn').textContent=x.username;
  document.getElementById('md').textContent=x.display_name||'';
  document.getElementById('mpill').innerHTML=`<span class="gpill gp-${x.gender}" style="font-size:.7rem;padding:3px 10px">${gl[x.gender]||'—'} · ${x.country||'—'} ${x.is_hd?'· HD':''}</span>`;
  document.getElementById('ms').textContent=x.room_subject||'';
  document.getElementById('mv').textContent=fmt(x.num_users||0);
  document.getElementById('mf').textContent=fmt(x.num_followers||0);
  document.getElementById('ma').textContent=x.age||'—';
  document.getElementById('ml').href=`https://chaturbate.com/${x.username}/`;
  document.getElementById('mtags').innerHTML=(x.tags||[]).slice(0,14).map(t=>`<span class="tag">${t}</span>`).join('');
  const fv=favs.includes(u);
  const fb=document.getElementById('mfav');
  fb.textContent=fv?'♥ Quitar':'♥ Favorita';
  fb.style.color=fv?'var(--female)':'';
  document.getElementById('mb').classList.add('open');
}

function closeMod(e) {
  if(!e||e.target===document.getElementById('mb'))
    document.getElementById('mb').classList.remove('open');
}
document.addEventListener('keydown',e=>{if(e.key==='Escape')closeMod()});

function toggleFav(e,u) {
  e.stopPropagation();
  const i=favs.indexOf(u);
  if(i>=0){favs.splice(i,1);toast('Quitada de favoritas')}
  else{favs.push(u);toast('Favorita guardada ♥')}
  localStorage.setItem('cp2_favs',JSON.stringify(favs));
  document.getElementById('s-favs').textContent=favs.length;
  render();
}

function favMod() {
  if(!active) return;
  toggleFav({stopPropagation:()=>{}},active.username);
  const fv=favs.includes(active.username);
  const fb=document.getElementById('mfav');
  fb.textContent=fv?'♥ Quitar':'♥ Favorita';
  fb.style.color=fv?'var(--female)':'';
}

function toast(msg) {
  const t=document.getElementById('toast');
  t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2400);
}

// Gender filters
document.getElementById('gf').addEventListener('click',e=>{
  const b=e.target.closest('[data-g]');
  if(!b) return;
  gender=b.dataset.g;
  document.querySelectorAll('[data-g]').forEach(x=>{
    x.className='fb';
    if(x===b) x.classList.add(gender?`on-${gender}`:'on');
  });
  render();
});

// Special filters
document.getElementById('btn-co').addEventListener('click',()=>{
  country=country?'':'CO';
  document.getElementById('btn-co').classList.toggle('on',!!country);
  render();
});
document.getElementById('btn-fv').addEventListener('click',()=>{
  onlyFavs=!onlyFavs;
  document.getElementById('btn-fv').classList.toggle('on',onlyFavs);
  render();
});
document.getElementById('btn-hd').addEventListener('click',()=>{
  onlyHD=!onlyHD;
  document.getElementById('btn-hd').classList.toggle('on',onlyHD);
  render();
});

// Sort & search
document.getElementById('srt').addEventListener('change',e=>{sort=e.target.value;render()});
document.getElementById('search').addEventListener('input',()=>render());

// Table header sort
document.getElementById('th-v').addEventListener('click',()=>{sort='viewers';render()});
document.getElementById('th-f').addEventListener('click',()=>{sort='followers';render()});
document.getElementById('th-a').addEventListener('click',()=>{sort='age';render()});

// Refresh
document.getElementById('ref').addEventListener('click',load);

// View toggle
document.getElementById('vg').addEventListener('click',()=>{
  view='grid';
  document.getElementById('gc').classList.remove('hide');
  document.getElementById('lc').classList.remove('show');
  document.getElementById('vg').classList.add('on');
  document.getElementById('vl').classList.remove('on');
  render();
});
document.getElementById('vl').addEventListener('click',()=>{
  view='list';
  document.getElementById('gc').classList.add('hide');
  document.getElementById('lc').classList.add('show');
  document.getElementById('vg').classList.remove('on');
  document.getElementById('vl').classList.add('on');
  render();
});

// Auto-refresh 5 min
setInterval(load,5*60*1000);
load();
</script>
</body>
</html>
