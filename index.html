<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Campulse — Live Stats</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0a0a;
    --bg2: #111111;
    --bg3: #181818;
    --border: #222;
    --border2: #2a2a2a;
    --text: #f0ede8;
    --muted: #666;
    --muted2: #444;
    --accent: #e8573c;
    --accent2: #ff7a5c;
    --green: #3ecf8e;
    --blue: #4a9eff;
    --amber: #f5a623;
    --female: #ff6b9d;
    --male: #4a9eff;
    --couple: #a78bfa;
    --trans: #3ecf8e;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Header */
  header {
    border-bottom: 1px solid var(--border);
    padding: 0 2rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    position: sticky;
    top: 0;
    background: rgba(10,10,10,0.95);
    backdrop-filter: blur(12px);
    z-index: 100;
  }
  .logo {
    font-size: 1.1rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    display: flex;
    align-items: center;
    gap: 8px;
  }
  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }
  .header-right {
    display: flex;
    align-items: center;
    gap: 1.5rem;
    font-size: 0.75rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .live-badge {
    display: flex;
    align-items: center;
    gap: 5px;
    color: var(--green);
    font-size: 0.7rem;
  }
  .live-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: pulse 1.5s ease-in-out infinite;
  }

  /* Layout */
  main { padding: 2rem; max-width: 1400px; margin: 0 auto; }

  /* Stats bar */
  .stats-bar {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 2rem;
  }
  .stat-item {
    background: var(--bg2);
    padding: 1.25rem 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .stat-label {
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-family: 'DM Mono', monospace;
  }
  .stat-value {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    line-height: 1;
  }
  .stat-sub {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
  }
  .stat-item:nth-child(1) .stat-value { color: var(--text); }
  .stat-item:nth-child(2) .stat-value { color: var(--accent); }
  .stat-item:nth-child(3) .stat-value { color: var(--green); }
  .stat-item:nth-child(4) .stat-value { color: var(--amber); }

  /* Controls */
  .controls {
    display: flex;
    gap: 0.75rem;
    margin-bottom: 1.5rem;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.8rem;
    padding: 0.6rem 1rem 0.6rem 2.5rem;
    outline: none;
    transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent); }
  .search-wrap input::placeholder { color: var(--muted2); }
  .search-icon {
    position: absolute;
    left: 0.75rem;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 0.8rem;
  }
  .filter-group {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 3px;
  }
  .filter-btn {
    background: none;
    border: none;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.4rem 0.85rem;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover { color: var(--text); background: var(--border); }
  .filter-btn.active { background: var(--accent); color: white; }
  .filter-btn.active-f { background: var(--female); color: white; }
  .filter-btn.active-m { background: var(--male); color: white; }
  .filter-btn.active-c { background: var(--couple); color: white; }
  .filter-btn.active-t { background: var(--trans); color: white; }

  .sort-select {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 0.75rem;
    padding: 0.6rem 1rem;
    outline: none;
    cursor: pointer;
  }
  .refresh-btn {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    color: var(--muted);
    font-family: 'Syne', sans-serif;
    font-size: 0.75rem;
    font-weight: 600;
    padding: 0.6rem 1rem;
    cursor: pointer;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn:hover { color: var(--text); border-color: var(--accent); }
  .refresh-btn.loading .r-icon { animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* View toggles */
  .view-toggle {
    display: flex;
    gap: 4px;
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 8px;
    padding: 3px;
  }
  .view-btn {
    background: none;
    border: none;
    color: var(--muted);
    padding: 0.4rem 0.6rem;
    border-radius: 6px;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.15s;
  }
  .view-btn.active { background: var(--border); color: var(--text); }

  /* Results info */
  .results-info {
    font-size: 0.7rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    margin-bottom: 1rem;
  }

  /* GRID VIEW */
  .grid-view {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
    gap: 1rem;
  }
  .card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, border-color 0.2s;
    position: relative;
  }
  .card:hover { transform: translateY(-3px); border-color: var(--border2); }
  .card-img {
    width: 100%;
    aspect-ratio: 3/4;
    object-fit: cover;
    display: block;
    background: var(--bg3);
    transition: transform 0.3s;
  }
  .card:hover .card-img { transform: scale(1.04); }
  .card-img-wrap { overflow: hidden; position: relative; }
  .card-badges {
    position: absolute;
    top: 8px;
    left: 8px;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }
  .badge {
    font-size: 0.55rem;
    font-weight: 700;
    font-family: 'DM Mono', monospace;
    padding: 2px 6px;
    border-radius: 4px;
    text-transform: uppercase;
    letter-spacing: 0.05em;
  }
  .badge-hd { background: rgba(74,158,255,0.9); color: white; }
  .badge-new { background: rgba(62,207,142,0.9); color: white; }
  .viewers-badge {
    position: absolute;
    bottom: 8px;
    right: 8px;
    background: rgba(0,0,0,0.8);
    color: white;
    font-family: 'DM Mono', monospace;
    font-size: 0.65rem;
    font-weight: 500;
    padding: 3px 8px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .viewers-dot {
    width: 5px; height: 5px;
    border-radius: 50%;
    background: var(--green);
  }
  .gender-bar {
    height: 2px;
    width: 100%;
  }
  .gender-f { background: var(--female); }
  .gender-m { background: var(--male); }
  .gender-c { background: var(--couple); }
  .gender-t { background: var(--trans); }
  .card-body {
    padding: 0.75rem;
  }
  .card-name {
    font-size: 0.8rem;
    font-weight: 700;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    margin-bottom: 2px;
  }
  .card-meta {
    font-size: 0.65rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .fav-btn {
    position: absolute;
    top: 8px;
    right: 8px;
    background: rgba(0,0,0,0.6);
    border: none;
    width: 28px; height: 28px;
    border-radius: 50%;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.75rem;
    backdrop-filter: blur(4px);
    transition: transform 0.2s;
    color: var(--muted);
  }
  .fav-btn:hover { transform: scale(1.2); }
  .fav-btn.active { color: #ff4f6d; }

  /* LIST VIEW */
  .list-view { display: none; }
  .list-view.show { display: block; }
  .grid-view.hide { display: none; }
  .list-table {
    width: 100%;
    border-collapse: collapse;
    font-size: 0.8rem;
  }
  .list-table th {
    text-align: left;
    font-size: 0.65rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    padding: 0.5rem 0.75rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    white-space: nowrap;
  }
  .list-table th:hover { color: var(--text); }
  .list-table td {
    padding: 0.6rem 0.75rem;
    border-bottom: 1px solid var(--border);
    vertical-align: middle;
  }
  .list-table tr:hover td { background: var(--bg2); }
  .list-table tr { cursor: pointer; }
  .list-avatar {
    width: 36px; height: 36px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--bg3);
  }
  .list-name { font-weight: 600; }
  .list-sub { font-size: 0.65rem; color: var(--muted); font-family: 'DM Mono', monospace; }
  .viewers-bar-wrap {
    width: 100px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }
  .viewers-bar-fill {
    height: 100%;
    background: var(--accent);
    border-radius: 2px;
  }
  .gender-pill {
    font-size: 0.6rem;
    font-weight: 700;
    padding: 2px 8px;
    border-radius: 20px;
    font-family: 'DM Mono', monospace;
  }
  .pill-f { background: rgba(255,107,157,0.15); color: var(--female); }
  .pill-m { background: rgba(74,158,255,0.15); color: var(--male); }
  .pill-c { background: rgba(167,139,250,0.15); color: var(--couple); }
  .pill-t { background: rgba(62,207,142,0.15); color: var(--trans); }

  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(8px);
    padding: 1rem;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border2);
    border-radius: 16px;
    max-width: 700px;
    width: 100%;
    max-height: 90vh;
    overflow-y: auto;
    position: relative;
    animation: modalIn 0.2s ease;
  }
  @keyframes modalIn {
    from { opacity: 0; transform: scale(0.96) translateY(8px); }
    to { opacity: 1; transform: scale(1) translateY(0); }
  }
  .modal-close {
    position: absolute;
    top: 1rem; right: 1rem;
    background: var(--border);
    border: none;
    color: var(--muted);
    width: 32px; height: 32px;
    border-radius: 50%;
    cursor: pointer;
    font-size: 1rem;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.15s;
    z-index: 10;
  }
  .modal-close:hover { background: var(--border2); color: var(--text); }
  .modal-top {
    display: grid;
    grid-template-columns: 200px 1fr;
    gap: 0;
  }
  .modal-img {
    width: 200px;
    height: 260px;
    object-fit: cover;
    border-radius: 16px 0 0 0;
  }
  .modal-info {
    padding: 1.5rem;
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
  }
  .modal-name {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
    line-height: 1.1;
  }
  .modal-display {
    font-size: 0.8rem;
    color: var(--muted);
  }
  .modal-stats {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 0.75rem;
    padding: 1.25rem 1.5rem;
    border-top: 1px solid var(--border);
  }
  .modal-stat {
    text-align: center;
  }
  .modal-stat-val {
    font-size: 1.2rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .modal-stat-lbl {
    font-size: 0.6rem;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.08em;
    font-family: 'DM Mono', monospace;
    margin-top: 2px;
  }
  .modal-body {
    padding: 1.25rem 1.5rem;
    border-top: 1px solid var(--border);
  }
  .modal-subject {
    font-size: 0.8rem;
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    line-height: 1.6;
    margin-bottom: 1rem;
  }
  .modal-tags {
    display: flex;
    flex-wrap: wrap;
    gap: 6px;
    margin-bottom: 1.25rem;
  }
  .tag {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--muted);
    font-size: 0.65rem;
    font-family: 'DM Mono', monospace;
    padding: 3px 10px;
    border-radius: 20px;
  }
  .modal-actions {
    display: flex;
    gap: 0.75rem;
  }
  .btn-primary {
    flex: 1;
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 8px;
    padding: 0.75rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 700;
    cursor: pointer;
    text-decoration: none;
    text-align: center;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 6px;
    transition: opacity 0.15s;
  }
  .btn-primary:hover { opacity: 0.88; }
  .btn-secondary {
    background: var(--bg3);
    border: 1px solid var(--border2);
    color: var(--text);
    border-radius: 8px;
    padding: 0.75rem 1rem;
    font-family: 'Syne', sans-serif;
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: border-color 0.15s;
  }
  .btn-secondary:hover { border-color: var(--accent); }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--bg2);
    border: 1px solid var(--border2);
    color: var(--text);
    font-size: 0.8rem;
    font-family: 'DM Mono', monospace;
    padding: 0.75rem 1.25rem;
    border-radius: 10px;
    z-index: 2000;
    transform: translateY(100px);
    opacity: 0;
    transition: all 0.3s;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  /* Skeleton */
  .skeleton { animation: shimmer 1.5s infinite linear; }
  @keyframes shimmer {
    0% { background-color: var(--bg2); }
    50% { background-color: var(--bg3); }
    100% { background-color: var(--bg2); }
  }
  .skel-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }
  .skel-img {
    aspect-ratio: 3/4;
    background: var(--bg3);
  }
  .skel-body { padding: 0.75rem; }
  .skel-line {
    height: 10px;
    border-radius: 4px;
    margin-bottom: 6px;
  }

  /* Responsive */
  @media (max-width: 768px) {
    main { padding: 1rem; }
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    .modal-top { grid-template-columns: 1fr; }
    .modal-img { width: 100%; height: 240px; border-radius: 16px 16px 0 0; }
    .grid-view { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
  }
  @media (max-width: 480px) {
    .stats-bar { grid-template-columns: repeat(2, 1fr); }
    header { padding: 0 1rem; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-dot"></div>
    CAMPULSE
  </div>
  <div class="header-right">
    <div class="live-badge">
      <div class="live-dot"></div>
      LIVE
    </div>
    <span id="last-update">—</span>
  </div>
</header>

<main>
  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-item">
      <div class="stat-label">Salas online</div>
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-sub">chaturbate</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Viewers totales</div>
      <div class="stat-value" id="stat-viewers">—</div>
      <div class="stat-sub">en vivo ahora</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Favoritas</div>
      <div class="stat-value" id="stat-favs">0</div>
      <div class="stat-sub">guardadas</div>
    </div>
    <div class="stat-item">
      <div class="stat-label">Mostrando</div>
      <div class="stat-value" id="stat-showing">—</div>
      <div class="stat-sub">resultados</div>
    </div>
  </div>

  <!-- Controls -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Buscar modelo...">
    </div>
    <div class="filter-group" id="gender-filters">
      <button class="filter-btn active" data-gender="">Todos</button>
      <button class="filter-btn" data-gender="f">Mujeres</button>
      <button class="filter-btn" data-gender="m">Hombres</button>
      <button class="filter-btn" data-gender="c">Parejas</button>
      <button class="filter-btn" data-gender="t">Trans</button>
    </div>
    <div class="filter-group">
      <button class="filter-btn" id="btn-co" data-country="CO">🇨🇴 CO</button>
      <button class="filter-btn" id="btn-favs" data-special="favs">♥ Favs</button>
    </div>
    <select class="sort-select" id="sort-select">
      <option value="viewers">↓ Viewers</option>
      <option value="followers">↓ Seguidores</option>
      <option value="age">Edad</option>
    </select>
    <button class="refresh-btn" id="refresh-btn">
      <span class="r-icon">↺</span> Actualizar
    </button>
    <div class="view-toggle">
      <button class="view-btn active" id="view-grid" title="Grid">⊞</button>
      <button class="view-btn" id="view-list" title="Lista">☰</button>
    </div>
  </div>

  <div class="results-info" id="results-info"></div>

  <!-- Grid view -->
  <div class="grid-view" id="grid-container"></div>

  <!-- List view -->
  <div class="list-view" id="list-container">
    <table class="list-table">
      <thead>
        <tr>
          <th style="width:44px"></th>
          <th>Modelo</th>
          <th data-sort="gender">Género</th>
          <th data-sort="viewers">Viewers</th>
          <th data-sort="followers">Seguidores</th>
          <th data-sort="age">Edad</th>
          <th>País</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="list-body"></tbody>
    </table>
  </div>
</main>

<!-- Modal -->
<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal" id="modal-inner">
    <button class="modal-close" onclick="closeModal()">✕</button>
    <div class="modal-top">
      <img id="m-img" class="modal-img" src="" alt="">
      <div class="modal-info">
        <div>
          <div class="modal-name" id="m-name"></div>
          <div class="modal-display" id="m-display"></div>
        </div>
        <div id="m-pill"></div>
        <div id="m-subject" class="modal-subject"></div>
      </div>
    </div>
    <div class="modal-stats">
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-viewers"></div>
        <div class="modal-stat-lbl">Viewers</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-followers"></div>
        <div class="modal-stat-lbl">Seguidores</div>
      </div>
      <div class="modal-stat">
        <div class="modal-stat-val" id="m-age"></div>
        <div class="modal-stat-lbl">Edad</div>
      </div>
    </div>
    <div class="modal-body">
      <div class="modal-tags" id="m-tags"></div>
      <div class="modal-actions">
        <a id="m-link" href="#" target="_blank" class="btn-primary">Ver sala ↗</a>
        <button class="btn-secondary" id="m-fav" onclick="toggleFavFromModal()">♥ Favorita</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const AFFILIATE_ID = 'rI8z3';
const API_URL = `https://chaturbate.com/api/public/affiliates/onlinerooms/?wm=${AFFILIATE_ID}&client_ip=request_ip&format=json&limit=500`;
const PROXY = 'https://api.allorigins.win/raw?url=';

let allRooms = [];
let favorites = JSON.parse(localStorage.getItem('cp_favs') || '[]');
let currentGender = '';
let currentCountry = '';
let showFavsOnly = false;
let currentSort = 'viewers';
let currentView = 'grid';
let maxViewers = 1;
let activeRoom = null;

function fmt(n) {
  if (n >= 1000000) return (n/1000000).toFixed(1)+'M';
  if (n >= 1000) return (n/1000).toFixed(1)+'K';
  return n.toString();
}

function fmtTime(s) {
  const h = Math.floor(s/3600);
  const m = Math.floor((s%3600)/60);
  if (h > 0) return `${h}h ${m}m`;
  return `${m}m`;
}

async function loadRooms() {
  const btn = document.getElementById('refresh-btn');
  btn.classList.add('loading');
  showSkeleton();

  try {
    const res = await fetch(PROXY + encodeURIComponent(API_URL));
    const data = await res.json();
    allRooms = data.results || [];
    maxViewers = Math.max(...allRooms.map(r => r.num_users || 0), 1);
    updateStats();
    renderRooms();
    document.getElementById('last-update').textContent = new Date().toLocaleTimeString('es-CO');
  } catch(e) {
    document.getElementById('grid-container').innerHTML = `
      <div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">
        <div style="font-size:2rem;margin-bottom:0.5rem">⚠</div>
        <div>Error cargando datos. Intenta de nuevo.</div>
      </div>`;
  } finally {
    btn.classList.remove('loading');
  }
}

function showSkeleton() {
  const g = document.getElementById('grid-container');
  g.innerHTML = Array(20).fill(0).map(() => `
    <div class="skel-card skeleton">
      <div class="skel-img skeleton"></div>
      <div class="skel-body">
        <div class="skel-line skeleton" style="width:70%"></div>
        <div class="skel-line skeleton" style="width:45%"></div>
      </div>
    </div>`).join('');
}

function getFiltered() {
  const q = document.getElementById('search').value.toLowerCase().trim();
  let rooms = [...allRooms];

  if (currentGender) rooms = rooms.filter(r => r.gender === currentGender);
  if (currentCountry) rooms = rooms.filter(r => r.country === currentCountry);
  if (showFavsOnly) rooms = rooms.filter(r => favorites.includes(r.username));
  if (q) rooms = rooms.filter(r =>
    (r.username||'').toLowerCase().includes(q) ||
    (r.display_name||'').toLowerCase().includes(q)
  );

  rooms.sort((a,b) => {
    if (currentSort === 'viewers') return (b.num_users||0) - (a.num_users||0);
    if (currentSort === 'followers') return (b.num_followers||0) - (a.num_followers||0);
    if (currentSort === 'age') return (a.age||99) - (b.age||99);
    return 0;
  });

  return rooms;
}

function updateStats() {
  const total = allRooms.length;
  const viewers = allRooms.reduce((s,r) => s + (r.num_users||0), 0);
  document.getElementById('stat-total').textContent = fmt(total);
  document.getElementById('stat-viewers').textContent = fmt(viewers);
  document.getElementById('stat-favs').textContent = favorites.length;
}

function renderRooms() {
  const rooms = getFiltered();
  document.getElementById('stat-showing').textContent = fmt(rooms.length);
  document.getElementById('results-info').textContent =
    `${rooms.length.toLocaleString()} resultados${currentGender ? ' · ' + {f:'mujeres',m:'hombres',c:'parejas',t:'trans'}[currentGender] : ''}${currentCountry ? ' · Colombia' : ''}${showFavsOnly ? ' · favoritas' : ''}`;

  if (currentView === 'grid') renderGrid(rooms);
  else renderList(rooms);
}

function renderGrid(rooms) {
  const g = document.getElementById('grid-container');
  if (!rooms.length) {
    g.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:3rem;color:var(--muted)">Sin resultados</div>`;
    return;
  }
  g.innerHTML = rooms.map(r => {
    const isFav = favorites.includes(r.username);
    return `
    <div class="card" onclick="openModal('${r.username}')">
      <div class="card-img-wrap">
        <img class="card-img" src="${r.image_url||''}" alt="${r.username}" loading="lazy" onerror="this.src='data:image/svg+xml,<svg xmlns=\\'http://www.w3.org/2000/svg\\' width=\\'1\\' height=\\'1\\'></svg>'">
        <div class="card-badges">
          ${r.is_hd ? '<span class="badge badge-hd">HD</span>' : ''}
          ${r.is_new ? '<span class="badge badge-new">NEW</span>' : ''}
        </div>
        <div class="viewers-badge">
          <div class="viewers-dot"></div>
          ${fmt(r.num_users||0)}
        </div>
        <button class="fav-btn ${isFav?'active':''}" onclick="toggleFav(event,'${r.username}')">♥</button>
      </div>
      <div class="gender-bar gender-${r.gender}"></div>
      <div class="card-body">
        <div class="card-name">${r.display_name||r.username}</div>
        <div class="card-meta">${r.country||'—'} · ${r.age ? r.age+'a' : '—'}</div>
      </div>
    </div>`;
  }).join('');
}

function renderList(rooms) {
  const tbody = document.getElementById('list-body');
  if (!rooms.length) { tbody.innerHTML = `<tr><td colspan="8" style="text-align:center;padding:2rem;color:var(--muted)">Sin resultados</td></tr>`; return; }
  const gLabels = {f:'Mujer',m:'Hombre',c:'Pareja',t:'Trans'};
  tbody.innerHTML = rooms.map(r => `
    <tr onclick="openModal('${r.username}')">
      <td><img class="list-avatar" src="${r.image_url||''}" onerror="this.style.background='var(--bg3)'" loading="lazy"></td>
      <td>
        <div class="list-name">${r.display_name||r.username}</div>
        <div class="list-sub">@${r.username}</div>
      </td>
      <td><span class="gender-pill pill-${r.gender}">${gLabels[r.gender]||'—'}</span></td>
      <td>
        <div style="display:flex;align-items:center;gap:8px">
          <span style="font-family:'DM Mono',monospace;font-size:0.8rem">${fmt(r.num_users||0)}</span>
          <div class="viewers-bar-wrap"><div class="viewers-bar-fill" style="width:${Math.round(((r.num_users||0)/maxViewers)*100)}%"></div></div>
        </div>
      </td>
      <td style="font-family:'DM Mono',monospace;font-size:0.75rem;color:var(--muted)">${fmt(r.num_followers||0)}</td>
      <td style="font-family:'DM Mono',monospace;font-size:0.75rem">${r.age||'—'}</td>
      <td style="font-size:0.75rem;color:var(--muted)">${r.country||'—'}</td>
      <td>
        <button class="fav-btn ${favorites.includes(r.username)?'active':''}" 
          style="position:static;width:28px;height:28px;background:var(--bg3)"
          onclick="toggleFav(event,'${r.username}')">♥</button>
      </td>
    </tr>`).join('');
}

function openModal(username) {
  const r = allRooms.find(x => x.username === username);
  if (!r) return;
  activeRoom = r;
  const gLabels = {f:'Mujer',m:'Hombre',c:'Pareja',t:'Trans'};
  const gColors = {f:'var(--female)',m:'var(--male)',c:'var(--couple)',t:'var(--trans)'};
  document.getElementById('m-img').src = r.image_url||'';
  document.getElementById('m-name').textContent = r.username;
  document.getElementById('m-display').textContent = r.display_name||'';
  document.getElementById('m-pill').innerHTML = `<span class="gender-pill pill-${r.gender}">${gLabels[r.gender]||'—'} · ${r.country||'—'}</span>`;
  document.getElementById('m-subject').textContent = r.room_subject||'';
  document.getElementById('m-viewers').textContent = fmt(r.num_users||0);
  document.getElementById('m-followers').textContent = fmt(r.num_followers||0);
  document.getElementById('m-age').textContent = r.age||'—';
  document.getElementById('m-link').href = `https://chaturbate.com/${r.username}/`;
  document.getElementById('m-tags').innerHTML = (r.tags||[]).slice(0,12).map(t=>`<span class="tag">${t}</span>`).join('');
  const isFav = favorites.includes(username);
  document.getElementById('m-fav').textContent = isFav ? '♥ Quitar' : '♥ Favorita';
  document.getElementById('m-fav').style.color = isFav ? 'var(--female)' : '';
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) {
  if (!e || e.target === document.getElementById('modal')) {
    document.getElementById('modal').classList.remove('open');
  }
}

document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

function toggleFav(e, username) {
  e.stopPropagation();
  const idx = favorites.indexOf(username);
  if (idx >= 0) {
    favorites.splice(idx, 1);
    showToast('Quitada de favoritas');
  } else {
    favorites.push(username);
    showToast('Agregada a favoritas ♥');
  }
  localStorage.setItem('cp_favs', JSON.stringify(favorites));
  document.getElementById('stat-favs').textContent = favorites.length;
  renderRooms();
}

function toggleFavFromModal() {
  if (!activeRoom) return;
  toggleFav({ stopPropagation: ()=>{} }, activeRoom.username);
  const isFav = favorites.includes(activeRoom.username);
  document.getElementById('m-fav').textContent = isFav ? '♥ Quitar' : '♥ Favorita';
  document.getElementById('m-fav').style.color = isFav ? 'var(--female)' : '';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// Gender filters
document.getElementById('gender-filters').addEventListener('click', e => {
  const btn = e.target.closest('[data-gender]');
  if (!btn) return;
  currentGender = btn.dataset.gender;
  document.querySelectorAll('[data-gender]').forEach(b => {
    b.className = 'filter-btn';
    if (b === btn) b.classList.add(currentGender ? `active-${currentGender}` : 'active');
  });
  renderRooms();
});

// Country/favs
document.getElementById('btn-co').addEventListener('click', () => {
  currentCountry = currentCountry ? '' : 'CO';
  document.getElementById('btn-co').classList.toggle('active', !!currentCountry);
  renderRooms();
});
document.getElementById('btn-favs').addEventListener('click', () => {
  showFavsOnly = !showFavsOnly;
  document.getElementById('btn-favs').classList.toggle('active', showFavsOnly);
  renderRooms();
});

// Sort
document.getElementById('sort-select').addEventListener('change', e => {
  currentSort = e.target.value;
  renderRooms();
});

// Search
document.getElementById('search').addEventListener('input', () => renderRooms());

// Refresh
document.getElementById('refresh-btn').addEventListener('click', loadRooms);

// View toggle
document.getElementById('view-grid').addEventListener('click', () => {
  currentView = 'grid';
  document.getElementById('grid-container').classList.remove('hide');
  document.getElementById('list-container').classList.remove('show');
  document.getElementById('view-grid').classList.add('active');
  document.getElementById('view-list').classList.remove('active');
  renderRooms();
});
document.getElementById('view-list').addEventListener('click', () => {
  currentView = 'list';
  document.getElementById('grid-container').classList.add('hide');
  document.getElementById('list-container').classList.add('show');
  document.getElementById('view-grid').classList.remove('active');
  document.getElementById('view-list').classList.add('active');
  renderRooms();
});

// Auto-refresh cada 5 min
setInterval(loadRooms, 5 * 60 * 1000);

// Init
loadRooms();
</script>
</body>
</html>
